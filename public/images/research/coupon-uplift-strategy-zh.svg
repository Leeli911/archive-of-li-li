<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">优惠券触达因果 uplift 决策框架</title>
  <desc id="desc">展示从电商交易数据到 treatment/outcome 定义、uplift 建模、Qini/AUUC 评估和预算约束触达策略的流程图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf7ee"/>
      <stop offset="0.5" stop-color="#eef3ee"/>
      <stop offset="1" stop-color="#edf4f6"/>
    </linearGradient>
    <linearGradient id="accentA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c6816d"/>
      <stop offset="1" stop-color="#e7c878"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#4a3d30" flood-opacity="0.14"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.4" fill="#35312d" opacity="0.09"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="692" rx="30" fill="url(#dots)" opacity="0.55"/>
  <rect x="78" y="72" width="1044" height="616" rx="30" fill="#fbf8f0" opacity="0.78" filter="url(#shadow)"/>

  <text x="112" y="126" fill="#35312d" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="38" font-weight="700">优惠券触达因果 Uplift 决策框架</text>
  <text x="112" y="160" fill="#686159" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17">从观察交易数据，到识别真实增量价值用户</text>

  <g font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">
    <g transform="translate(112 214)">
      <rect width="184" height="128" rx="20" fill="#ffffff" opacity="0.78" stroke="#35312d" stroke-opacity="0.12"/>
      <circle cx="34" cy="36" r="16" fill="url(#accentA)" opacity="0.92"/>
      <text x="58" y="42" fill="#35312d" font-size="18" font-weight="700">数据层</text>
      <text x="24" y="74" fill="#686159" font-size="14">交易记录</text>
      <text x="24" y="96" fill="#686159" font-size="14">优惠券触达</text>
      <text x="24" y="118" fill="#686159" font-size="14">用户画像</text>
    </g>

    <g transform="translate(340 214)">
      <rect width="204" height="128" rx="20" fill="#ffffff" opacity="0.78" stroke="#35312d" stroke-opacity="0.12"/>
      <circle cx="36" cy="36" r="16" fill="#94abb5" opacity="0.9"/>
      <text x="60" y="42" fill="#35312d" font-size="18" font-weight="700">因果设定</text>
      <text x="24" y="74" fill="#686159" font-size="14">treatment = 发券</text>
      <text x="24" y="96" fill="#686159" font-size="14">outcome = 购买</text>
      <text x="24" y="118" fill="#686159" font-size="14">比较反事实结果</text>
    </g>

    <g transform="translate(588 214)">
      <rect width="206" height="128" rx="20" fill="#ffffff" opacity="0.78" stroke="#35312d" stroke-opacity="0.12"/>
      <circle cx="36" cy="36" r="16" fill="#8fa58a" opacity="0.9"/>
      <text x="60" y="42" fill="#35312d" font-size="18" font-weight="700">Uplift 模型</text>
      <text x="24" y="74" fill="#686159" font-size="14">T-Learner / CATE</text>
      <text x="24" y="96" fill="#686159" font-size="14">按增量收益排序</text>
      <text x="24" y="118" fill="#686159" font-size="14">识别响应类型</text>
    </g>

    <g transform="translate(838 214)">
      <rect width="210" height="128" rx="20" fill="#ffffff" opacity="0.78" stroke="#35312d" stroke-opacity="0.12"/>
      <circle cx="36" cy="36" r="16" fill="#e7c878" opacity="0.95"/>
      <text x="60" y="42" fill="#35312d" font-size="18" font-weight="700">效果评估</text>
      <text x="24" y="74" fill="#686159" font-size="14">Qini / AUUC</text>
      <text x="24" y="96" fill="#686159" font-size="14">Bootstrap 置信区间</text>
      <text x="24" y="118" fill="#686159" font-size="14">离线策略校验</text>
    </g>
  </g>

  <g fill="none" stroke="#35312d" stroke-opacity="0.25" stroke-width="2.4" stroke-linecap="round">
    <path d="M302 278 C316 278 322 278 334 278"/>
    <path d="M550 278 C564 278 570 278 582 278"/>
    <path d="M800 278 C814 278 820 278 832 278"/>
  </g>
  <g fill="#35312d" opacity="0.28">
    <path d="M334 278 l-10 -6 v12z"/>
    <path d="M582 278 l-10 -6 v12z"/>
    <path d="M832 278 l-10 -6 v12z"/>
  </g>

  <g transform="translate(124 410)" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif">
    <rect width="956" height="164" rx="24" fill="#f4efe4" opacity="0.74" stroke="#35312d" stroke-opacity="0.11"/>
    <text x="30" y="44" fill="#35312d" font-size="20" font-weight="700">预算约束触达策略</text>
    <text x="30" y="74" fill="#686159" font-size="15">不要只看活动后收入，而是用预测增量收益决定发券优先级。</text>

    <g transform="translate(34 104)">
      <rect width="174" height="48" rx="16" fill="#f7e1d8" stroke="#c6816d" stroke-opacity="0.3"/>
      <text x="38" y="30" fill="#35312d" font-size="15" font-weight="700">可说服用户</text>
    </g>
    <g transform="translate(244 104)">
      <rect width="154" height="48" rx="16" fill="#f5ecca" stroke="#e7c878" stroke-opacity="0.35"/>
      <text x="40" y="30" fill="#35312d" font-size="15" font-weight="700">自然购买</text>
    </g>
    <g transform="translate(434 104)">
      <rect width="154" height="48" rx="16" fill="#e4ecd9" stroke="#8fa58a" stroke-opacity="0.35"/>
      <text x="42" y="30" fill="#35312d" font-size="15" font-weight="700">低响应</text>
    </g>
    <g transform="translate(624 104)">
      <rect width="206" height="48" rx="16" fill="#dfecef" stroke="#94abb5" stroke-opacity="0.35"/>
      <text x="50" y="30" fill="#35312d" font-size="15" font-weight="700">负向响应用户</text>
    </g>
  </g>

  <text x="112" y="646" fill="#686159" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15">决策输出：优先触达 top-uplift 用户，保留实验依据，并报告带不确定性的增量价值。</text>
</svg>
